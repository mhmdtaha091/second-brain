<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Second Brain — Knowledge Graph</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131f;
    --border: #1e1e35;
    --text: #e0e0f0;
    --muted: #6b6b8a;
    --accent: #00f0ff;
    --accent2: #b44dff;
    --accent3: #ff3d7f;
    --glow: 0 0 20px rgba(0,240,255,0.3);
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* --- Canvas --- */
  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 1;
  }
  canvas { display: block; }

  /* --- HUD overlay --- */
  #hud {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }
  #hud > * { pointer-events: auto; }

  /* --- Top bar --- */
  #topbar {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 8px 16px;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #topbar .logo {
    font-weight: 700;
    font-size: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-right: 8px;
  }
  #search-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 20px;
    width: 260px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--muted); }

  #stats-pill {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    white-space: nowrap;
  }

  .hud-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .hud-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hud-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  /* --- Detail panel --- */
  #detail-panel {
    position: absolute;
    right: 16px;
    top: 100px;
    bottom: 100px;
    width: 340px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    overflow-y: auto;
    display: none;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  #detail-panel.visible { display: block; }
  #detail-panel h2 {
    font-size: 18px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #detail-panel .meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
    font-family: var(--mono);
  }
  #detail-panel .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  #detail-panel .tag {
    background: rgba(180,77,255,0.15);
    color: var(--accent2);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
  }
  #detail-panel .content {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    opacity: 0.85;
  }
  #detail-panel .links-section { margin-top: 16px; }
  #detail-panel .links-section h3 {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  #detail-panel .link-item {
    display: block;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--accent);
    transition: background 0.2s;
  }
  #detail-panel .link-item:hover { background: rgba(0,240,255,0.08); }
  #close-detail {
    position: absolute;
    top: 12px; right: 12px;
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 20px;
  }
  #close-detail:hover { color: var(--text); }

  /* --- Gesture indicator --- */
  #gesture-indicator {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--accent);
    font-family: var(--mono);
    display: none;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  /* --- Legend --- */
  #legend {
    position: absolute;
    left: 16px;
    bottom: 30px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    font-size: 11px;
    color: var(--muted);
    backdrop-filter: blur(20px);
  }
  #legend .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  #legend .dot.project { background: #ffdd00; box-shadow: 0 0 12px #ffdd00; }
  #legend .dot.hub { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  #legend .dot.normal { background: var(--accent2); }
  #legend .dot.orphan { background: var(--accent3); }

  /* --- Webcam preview (for hand tracking) --- */
  #webcam-preview {
    position: absolute;
    bottom: 30px;
    right: 16px;
    width: 160px;
    height: 120px;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: none;
    z-index: 20;
  }
  #webcam-preview video { width:100%; height:100%; object-fit:cover; }

  /* --- Responsive --- */
  @media (max-width: 768px) {
    #topbar { flex-wrap: wrap; border-radius: 20px; padding: 10px; }
    #search-input { width: 160px; }
    #detail-panel { width: calc(100% - 32px); right: 16px; left: 16px; top: 80px; bottom: 80px; }
    #legend { display: none; }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud">
  <!-- Top Bar -->
  <div id="topbar">
    <span class="logo">🧠 Second Brain</span>
    <input id="search-input" type="text" placeholder="Search knowledge graph…" autocomplete="off">
    <span id="stats-pill"></span>
    <button class="hud-btn" id="btn-fit" title="Fit all nodes in view">⊞ Fit</button>
    <button class="hud-btn" id="btn-ar" title="Enter AR mode (WebXR)">🔮 AR</button>
    <button class="hud-btn" id="btn-hands" title="Toggle hand tracking">✋ Hands</button>
    <button class="hud-btn" id="btn-tags" title="Color by tag community">🏷️ Tags</button>
  </div>

  <!-- Detail Panel -->
  <div id="detail-panel">
    <button id="close-detail">✕</button>
    <div id="detail-content"></div>
  </div>

  <!-- Gesture Indicator -->
  <div id="gesture-indicator">✋ Gesture detected</div>

  <!-- Legend -->
  <div id="legend">
    <div><span class="dot project"></span> Project</div>
    <div><span class="dot hub"></span> Hub (connected)</div>
    <div><span class="dot normal"></span> File / Note</div>
    <div><span class="dot orphan"></span> Orphan (unlinked)</div>
    <div style="margin-top:6px;color:var(--muted)">Drag to rotate | Scroll to zoom</div>
    <div style="color:var(--muted)">Click node for details</div>
  </div>

  <!-- Webcam Preview -->
  <div id="webcam-preview">
    <video id="webcam-video" autoplay playsinline></video>
  </div>
</div>

<!-- Three.js -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ──────────────────────────────────────
// State
// ──────────────────────────────────────
let graphData = null;
let nodeMeshes = [];
let edgeLines = [];
let labelObjects = [];
let selectedNode = null;
let handTrackingActive = false;
let arSession = null;
let tagColorMode = false;

// ──────────────────────────────────────
// Three.js Setup
// ──────────────────────────────────────
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();

// Background — subtle radial gradient via fog + color
scene.background = new THREE.Color('#0a0a0f');
scene.fog = new THREE.FogExp2('#0a0a0f', 0.00015);

const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(20, 12, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// CSS2D Renderer for labels
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(container.clientWidth, container.clientHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

// Post-processing — bloom for neon glow
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(container.clientWidth, container.clientHeight),
  0.5,   // strength
  0.4,   // radius
  0.2    // threshold
);
composer.addPass(bloomPass);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 80;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.target.set(0, 0, 0);

// ──────────────────────────────────────
// Lighting
// ──────────────────────────────────────
const ambientLight = new THREE.AmbientLight('#1a1a3a', 1.5);
scene.add(ambientLight);

const pointLight1 = new THREE.PointLight('#00f0ff', 80, 60);
pointLight1.position.set(20, 15, 20);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight('#b44dff', 60, 50);
pointLight2.position.set(-15, -5, -15);
scene.add(pointLight2);

const pointLight3 = new THREE.PointLight('#ff3d7f', 40, 40);
pointLight3.position.set(0, 10, -20);
scene.add(pointLight3);

// ──────────────────────────────────────
// Starfield / Particle Background
// ──────────────────────────────────────
const starsGeo = new THREE.BufferGeometry();
const starCount = 1200;
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPositions[i * 3] = (Math.random() - 0.5) * 80;
  starPositions[i * 3 + 1] = (Math.random() - 0.5) * 80;
  starPositions[i * 3 + 2] = (Math.random() - 0.5) * 80;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starsMat = new THREE.PointsMaterial({
  color: '#334466',
  size: 0.06,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const stars = new THREE.Points(starsGeo, starsMat);
scene.add(stars);

// Grid ring for spatial reference
const gridRing = new THREE.RingGeometry(14, 14.05, 120);
const gridRingMat = new THREE.MeshBasicMaterial({
  color: '#1a1a3a',
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.5,
  depthWrite: false,
});
const grid = new THREE.Mesh(gridRing, gridRingMat);
grid.rotation.x = -Math.PI / 2;
grid.position.y = -12;
scene.add(grid);

// ──────────────────────────────────────
// Graph Rendering
// ──────────────────────────────────────

function getNodeColor(node, alpha = 1) {
  // Project nodes are golden
  if (node.type === 'project') return new THREE.Color('#ffdd00');

  if (tagColorMode && node.tags && node.tags.length > 0) {
    const hash = node.tags[0].split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const hue = (hash * 137.5) % 360;
    return new THREE.Color(`hsl(${hue}, 70%, 60%)`);
  }
  const degree = node.degree || 0;
  if (degree >= 5) return new THREE.Color('#00f0ff');  // hub - cyan
  if (degree === 0) return new THREE.Color('#ff3d7f'); // orphan - pink
  return new THREE.Color('#b44dff');                    // normal - purple
}

function getNodeSize(node) {
  if (node.type === 'project') {
    const degree = node.degree || 0;
    return Math.max(0.8, Math.min(2.0, 1.0 + degree * 0.03));
  }
  const degree = node.degree || 0;
  return Math.max(0.15, Math.min(0.7, 0.2 + degree * 0.06));
}

function clearGraph() {
  nodeMeshes.forEach(m => scene.remove(m));
  edgeLines.forEach(l => scene.remove(l));
  labelObjects.forEach(l => scene.remove(l));
  nodeMeshes = [];
  edgeLines = [];
  labelObjects = [];
}

function buildGraphVisuals() {
  if (!graphData) return;
  clearGraph();

  const { nodes, edges } = graphData;
  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  // ── Layout: 3D force-directed via simple spring algorithm ──
  const positions = {};
  nodes.forEach(n => {
    positions[n.id] = new THREE.Vector3(
      (Math.random() - 0.5) * 20,
      (Math.random() - 0.5) * 15,
      (Math.random() - 0.5) * 20
    );
  });

  // Run a few iterations of force layout
  const repulsion = 300;
  const attraction = 0.01;
  const damping = 0.9;
  const velocities = {};
  nodes.forEach(n => { velocities[n.id] = new THREE.Vector3(); });

  for (let iter = 0; iter < 80; iter++) {
    // Repulsion between all pairs
    const nids = Object.keys(positions);
    for (let i = 0; i < nids.length; i++) {
      for (let j = i + 1; j < nids.length; j++) {
        const a = positions[nids[i]];
        const b = positions[nids[j]];
        const diff = new THREE.Vector3().subVectors(a, b);
        const dist = Math.max(0.5, diff.length());
        const force = repulsion / (dist * dist);
        diff.normalize().multiplyScalar(force * 0.005);
        velocities[nids[i]].add(diff);
        velocities[nids[j]].sub(diff);
      }
    }
    // Attraction along edges
    edges.forEach(e => {
      const a = positions[e.source];
      const b = positions[e.target];
      if (!a || !b) return;
      const diff = new THREE.Vector3().subVectors(b, a);
      const dist = diff.length();
      const force = attraction * (dist - 3);
      diff.normalize().multiplyScalar(force * 0.1);
      velocities[e.source].add(diff);
      velocities[e.target].sub(diff);
    });
    // Apply velocities
    nids.forEach(id => {
      velocities[id].multiplyScalar(damping);
      positions[id].add(velocities[id]);
    });
  }

  // ── Create meshes ──
  const PROJECT_COLORS = [
    '#ffdd00', '#00f0ff', '#b44dff', '#ff3d7f', '#00ff88',
    '#ff8800', '#88ddff', '#ff66aa', '#66ffcc', '#ffcc33',
    '#44ddff', '#ff6699', '#aadd00', '#ff9944', '#88bbff',
    '#ff5577', '#55dd88',
  ];
  const projectColorMap = {};
  const projectNames = [...new Set(nodes.filter(n => n.type === 'project').map(n => n.label))];
  projectNames.forEach((name, i) => {
    projectColorMap[name] = PROJECT_COLORS[i % PROJECT_COLORS.length];
  });

  nodes.forEach(node => {
    const pos = positions[node.id];
    const size = getNodeSize(node);
    const color = getNodeColor(node);
    const isProject = node.type === 'project';

    // Outer glow (bigger for projects)
    const glowScale = isProject ? 2.0 : 1.4;
    const glowGeo = new THREE.SphereGeometry(size * glowScale, 32, 32);
    const glowMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: isProject ? 0.3 : 0.12,
      depthWrite: false,
    });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    glowMesh.position.copy(pos);
    scene.add(glowMesh);
    nodeMeshes.push(glowMesh);

    // Main sphere
    const mat = new THREE.MeshStandardMaterial({
      color: color,
      roughness: isProject ? 0.15 : 0.3,
      metalness: isProject ? 0.9 : 0.6,
      emissive: color,
      emissiveIntensity: isProject ? 0.7 : 0.35,
    });
    const geo = new THREE.SphereGeometry(size, isProject ? 48 : 32, isProject ? 48 : 32);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.userData = { nodeId: node.id, nodeData: node };
    scene.add(mesh);
    nodeMeshes.push(mesh);

    // Orbit ring(s) for projects and hubs
    if (isProject) {
      // Double ring for projects
      for (let r = 0; r < 2; r++) {
        const ringGeo = new THREE.TorusGeometry(size * (1.8 + r * 0.5), 0.03 + r * 0.01, 16, 64);
        const ringMat = new THREE.MeshBasicMaterial({
          color: color,
          transparent: true,
          opacity: 0.5 - r * 0.15,
          depthWrite: false,
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.copy(pos);
        ring.rotation.x = Math.random() * Math.PI;
        ring.rotation.y = Math.random() * Math.PI;
        ring.userData = { nodeId: node.id, isRing: true };
        scene.add(ring);
        nodeMeshes.push(ring);
      }
    } else if (node.degree >= 4) {
      const ringGeo = new THREE.TorusGeometry(size * 1.6, 0.04, 16, 48);
      const ringMat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.35,
        depthWrite: false,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.copy(pos);
      ring.rotation.x = Math.random() * Math.PI;
      ring.rotation.y = Math.random() * Math.PI;
      ring.userData = { nodeId: node.id, isRing: true };
      scene.add(ring);
      nodeMeshes.push(ring);
    }

    // Label
    const labelDiv = document.createElement('div');
    labelDiv.textContent = node.label;
    const labelSize = isProject ? (14 + Math.min(node.degree || 0, 30) * 0.5) : (9 + (node.degree || 0) * 1.2);
    labelDiv.style.cssText = `
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: ${labelSize}px;
      color: ${isProject ? '#ffdd00' : '#e0e0f0'};
      text-shadow: 0 0 ${isProject ? '14px' : '8px'} ${'#' + color.getHexString()};
      pointer-events: none;
      white-space: nowrap;
      font-weight: ${isProject ? '700' : (node.degree >= 4 ? '600' : '400')};
      ${isProject ? 'letter-spacing: 1px;' : ''}
    `;
    const label = new CSS2DObject(labelDiv);
    label.position.copy(pos.clone().add(new THREE.Vector3(0, size + 0.8, 0)));
    label.userData = { nodeId: node.id };
    scene.add(label);
    labelObjects.push(label);
  });

  // ── Create edge lines ──
  edges.forEach(e => {
    const a = positions[e.source];
    const b = positions[e.target];
    if (!a || !b) return;

    const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
    // Curve upward slightly
    const dir = new THREE.Vector3().subVectors(b, a);
    const perp = new THREE.Vector3(-dir.z, 0, dir.x).normalize();
    const dist = dir.length();
    mid.add(perp.multiplyScalar(dist * 0.15));
    mid.y += dist * 0.08;

    const curve = new THREE.QuadraticBezierCurve3(a.clone(), mid, b.clone());
    const points = curve.getPoints(32);
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({
      color: '#2a2a4a',
      transparent: true,
      opacity: 0.35,
      depthWrite: false,
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    edgeLines.push(line);
  });
}

// ──────────────────────────────────────
// Data Loading
// ──────────────────────────────────────
async function loadGraph() {
  try {
    const resp = await fetch('/api/graph');
    graphData = await resp.json();
    buildGraphVisuals();
    updateStats();
  } catch (err) {
    console.error('Failed to load graph:', err);
    // Try loading from static file
    try {
      const resp = await fetch('graph-data.json');
      graphData = await resp.json();
      buildGraphVisuals();
      updateStats();
    } catch (e2) {
      document.getElementById('stats-pill').textContent = '⚠️ No graph data';
    }
  }
}

function updateStats() {
  if (!graphData) return;
  const { stats } = graphData;
  document.getElementById('stats-pill').textContent =
    `${stats.total_notes} notes · ${stats.total_edges} links · ${stats.total_tags} tags`;
}

// ──────────────────────────────────────
// Interaction — Raycasting
// ──────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / container.clientWidth) * 2 - 1;
  mouse.y = -(event.clientY / container.clientHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes.filter(m => m.userData.nodeId && !m.userData.isRing));

  if (intersects.length > 0) {
    const nodeData = intersects[0].object.userData.nodeData;
    showDetail(nodeData);
  }
});

// ──────────────────────────────────────
// Detail Panel
// ──────────────────────────────────────
async function showDetail(node) {
  selectedNode = node;
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const isProject = node.type === 'project';

  const tagHtml = (node.tags || []).slice(0, 15).map(t => `<span class="tag">#${t}</span>`).join('');
  const degree = node.degree || 0;
  const summary = (node.summary || node.description || '').substring(0, 400);

  let typeLabel = isProject ? 'PROJECT' : (node.type || 'NOTE');
  let typeColor = isProject ? '#ffdd00' : '#b44dff';

  // Find connected nodes
  const connectedNodes = [];
  if (graphData) {
    const adj = graphData.adjacency || {};
    const neighbors = adj[node.id] || [];
    const nodeMap = {};
    graphData.nodes.forEach(n => { nodeMap[n.id] = n; });
    neighbors.forEach(nid => {
      if (nodeMap[nid]) connectedNodes.push(nodeMap[nid]);
    });
  }
  const connectedHtml = connectedNodes.slice(0, 15).map(n =>
    `<span class="link-item" data-nid="${n.id}">→ ${n.label} <span style="color:var(--muted);font-size:10px">[${n.type||''}]</span></span>`
  ).join('');

  content.innerHTML = `
    <h2>${node.label}</h2>
    <div class="meta">
      <span style="color:${typeColor};font-weight:600">${typeLabel}</span>
      ${node.path ? ' · ' + node.path : ''}
      ${node.project ? ' · @' + node.project : ''}
      · ${degree} connections
    </div>
    <div class="tags">${tagHtml || '<span style="color:var(--muted);font-size:12px">No tags</span>'}</div>
    ${summary ? `<div class="content">${summary}</div>` : ''}
    ${connectedHtml ? `<div class="links-section"><h3>Connected (${connectedNodes.length})</h3>${connectedHtml}</div>` : ''}
  `;

  // Click on connected nodes to navigate
  content.querySelectorAll('.link-item').forEach(el => {
    el.addEventListener('click', () => {
      const nid = el.dataset.nid;
      const target = graphData.nodes.find(n => n.id === nid);
      if (target) showDetail(target);
    });
  });

  panel.classList.add('visible');
}

document.getElementById('close-detail').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('visible');
  selectedNode = null;
});

// ──────────────────────────────────────
// Search
// ──────────────────────────────────────
let searchTimeout;
document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => searchNodes(e.target.value), 200);
});

function searchNodes(query) {
  if (!graphData) return;
  const q = query.toLowerCase().trim();

  // Reset all node opacities
  nodeMeshes.forEach(m => {
    if (m.material && m.material.opacity !== undefined) {
      m.material.opacity = m.userData.isRing ? 0.4 : (m.material.emissiveIntensity !== undefined ? 1 : 0.15);
    }
  });
  labelObjects.forEach(l => { l.visible = true; });

  if (!q) return;

  const matchingIds = new Set();
  graphData.nodes.forEach(n => {
    const matchLabel = n.label.toLowerCase().includes(q);
    const matchTag = (n.tags || []).some(t => t.toLowerCase().includes(q));
    if (matchLabel || matchTag) matchingIds.add(n.id);
  });

  nodeMeshes.forEach(m => {
    if (m.userData.nodeId && !matchingIds.has(m.userData.nodeId)) {
      if (m.material.opacity !== undefined) m.material.opacity = 0.08;
    }
  });
  labelObjects.forEach(l => {
    if (l.userData.nodeId && !matchingIds.has(l.userData.nodeId)) {
      l.visible = false;
    }
  });
}

// ──────────────────────────────────────
// AR Mode (WebXR)
// ──────────────────────────────────────
document.getElementById('btn-ar').addEventListener('click', async () => {
  if (arSession) {
    arSession.end();
    return;
  }

  if (!navigator.xr) {
    alert('WebXR not supported in this browser. Try Chrome on Android or an AR headset.');
    return;
  }

  try {
    const supported = await navigator.xr.isSessionSupported('immersive-ar');
    if (!supported) {
      alert('AR session not supported. Try a mobile device or AR headset with WebXR support.');
      return;
    }

    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local-floor', 'hand-tracking'],
      optionalFeatures: ['dom-overlay'],
    });

    arSession = session;
    document.getElementById('btn-ar').classList.add('active');
    document.getElementById('btn-ar').textContent = '🔮 Exit AR';

    renderer.xr.setSession(session);
    renderer.xr.enabled = true;

    session.addEventListener('end', () => {
      arSession = null;
      renderer.xr.enabled = false;
      document.getElementById('btn-ar').classList.remove('active');
      document.getElementById('btn-ar').textContent = '🔮 AR';
    });

    // Position graph in front of user in AR
    camera.position.set(0, 1.5, -3);
    controls.target.set(0, 0, -3);
  } catch (err) {
    console.error('AR error:', err);
    alert('Failed to start AR: ' + err.message);
  }
});

// ──────────────────────────────────────
// Hand Tracking (MediaPipe — via webcam)
// ──────────────────────────────────────
let handLandmarker = null;
let handVision = null;
let lastGesture = null;
let gestureStableCount = 0;

async function initHandTracking() {
  if (!handVision) {
    // Dynamically load MediaPipe
    const { FilesetResolver, HandLandmarker } = await import(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/+esm'
    );

    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm'
    );

    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numHands: 2,
    });
    handVision = vision;
  }

  // Start webcam
  const video = document.getElementById('webcam-video');
  const preview = document.getElementById('webcam-preview');

  if (!handTrackingActive) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
      video.srcObject = stream;
      preview.style.display = 'block';
      handTrackingActive = true;
      document.getElementById('btn-hands').classList.add('active');
      document.getElementById('gesture-indicator').style.display = 'block';
      requestAnimationFrame(detectHands);
    } catch (err) {
      console.error('Camera error:', err);
      alert('Could not access webcam for hand tracking: ' + err.message);
    }
  } else {
    // Stop
    const stream = document.getElementById('webcam-video').srcObject;
    if (stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById('webcam-preview').style.display = 'none';
    handTrackingActive = false;
    document.getElementById('btn-hands').classList.remove('active');
    document.getElementById('gesture-indicator').style.display = 'none';
  }
}

function detectHands() {
  if (!handTrackingActive || !handLandmarker) return;

  const video = document.getElementById('webcam-video');
  if (video.readyState < 2) {
    requestAnimationFrame(detectHands);
    return;
  }

  const results = handLandmarker.detectForVideo(video, performance.now());

  if (results.landmarks && results.landmarks.length > 0) {
    processGestures(results.landmarks);
  }

  requestAnimationFrame(detectHands);
}

function processGestures(landmarks) {
  // landmarks[0] = first hand, 21 landmarks each
  const hand = landmarks[0];

  // Thumb tip (4) vs index tip (8) distance → pinch detection
  const thumbTip = hand[4];
  const indexTip = hand[8];
  const pinchDist = Math.sqrt(
    (thumbTip.x - indexTip.x) ** 2 +
    (thumbTip.y - indexTip.y) ** 2 +
    (thumbTip.z - indexTip.z) ** 2
  );

  // Middle finger tip (12) vs wrist (0) → grab detection
  const middleTip = hand[12];
  const wrist = hand[0];
  const grabDist = Math.sqrt(
    (middleTip.x - wrist.x) ** 2 +
    (middleTip.y - wrist.y) ** 2 +
    (middleTip.z - wrist.z) ** 2
  );

  let gesture = 'none';
  if (pinchDist < 0.05) gesture = 'pinch';      // Select
  else if (grabDist < 0.15) gesture = 'grab';    // Rotate/zoom
  else if (hand[8].y < hand[6].y && hand[12].y < hand[10].y) gesture = 'peace'; // Navigate

  document.getElementById('gesture-indicator').textContent =
    `✋ ${gesture.toUpperCase()}`;

  // Apply gesture controls
  if (gesture === 'grab') {
    // Rotate graph
    const dx = (hand[9].x - 0.5) * 0.05;
    const dy = (hand[9].y - 0.5) * 0.05;
    controls.autoRotate = false;
    scene.rotation.y += dx;
    scene.rotation.x += dy * 0.5;
  } else if (gesture === 'pinch') {
    // Zoom in
    camera.position.multiplyScalar(0.995);
  } else if (gesture === 'peace') {
    // Zoom out
    camera.position.multiplyScalar(1.005);
  } else {
    controls.autoRotate = true;
  }

  lastGesture = gesture;
}

document.getElementById('btn-hands').addEventListener('click', initHandTracking);

// UI Buttons

document.getElementById('btn-fit').addEventListener('click', () => {
  camera.position.set(20, 12, 25);
  controls.target.set(0, 0, 0);
  controls.update();
});

document.getElementById('btn-tags').addEventListener('click', function() {
  tagColorMode = !tagColorMode;
  this.classList.toggle('active', tagColorMode);
  buildGraphVisuals();
});

// ──────────────────────────────────────
// Keyboard shortcuts
// ──────────────────────────────────────
document.addEventListener('keydown', (e) => {
  switch(e.key.toLowerCase()) {
    case 'f': camera.position.set(20, 12, 25); controls.target.set(0,0,0); break;
    case 's': document.getElementById('search-input').focus(); break;
    case 't': tagColorMode = !tagColorMode; buildGraphVisuals(); break;
    case 'escape':
      document.getElementById('detail-panel').classList.remove('visible');
      selectedNode = null;
      break;
    case 'r': controls.autoRotate = !controls.autoRotate; break;
  }
});

// ──────────────────────────────────────
// Animation Loop
// ──────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  controls.update();

  // Subtle star rotation
  stars.rotation.y += 0.0001;
  stars.rotation.x += 0.00005;

  // Pulse selected node's ring
  nodeMeshes.forEach(m => {
    if (m.userData.isRing && m.userData.nodeId === selectedNode?.id) {
      m.rotation.z += 0.02;
      m.rotation.x += 0.01;
      if (m.material.opacity !== undefined) {
        m.material.opacity = 0.5 + Math.sin(Date.now() * 0.005) * 0.3;
      }
    }
  });

  composer.render();
  labelRenderer.render(scene, camera);
}

// ──────────────────────────────────────
// Resize Handler
// ──────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
  labelRenderer.setSize(container.clientWidth, container.clientHeight);
  composer.setSize(container.clientWidth, container.clientHeight);
});

// ──────────────────────────────────────
// Start

loadGraph();
animate();
