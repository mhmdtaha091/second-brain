<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain — Knowledge Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM — Second Brain
   Dark Mode OLED · Inter · Green+Indigo accent
   ═══════════════════════════════════════════════ */
:root {
  /* Surfaces */
  --bg-root: #08080D;
  --bg-surface: #111118;
  --bg-elevated: #181825;
  --bg-glass: rgba(17,17,24,0.85);

  /* Borders */
  --border-subtle: #1E1E2E;
  --border-default: #2A2A3C;
  --border-strong: #3A3A50;

  /* Text */
  --text-primary: #F1F1F6;
  --text-secondary: #A1A1B4;
  --text-muted: #6B6B8A;
  --text-disabled: #48485E;

  /* Accents */
  --accent: #22C55E;
  --accent-hover: #16A34A;
  --accent-dim: rgba(34,197,94,0.12);
  --accent-glow: 0 0 20px rgba(34,197,94,0.25);

  /* Semantic */
  --info: #6366F1;
  --info-dim: rgba(99,102,241,0.15);
  --info-glow: 0 0 18px rgba(99,102,241,0.3);
  --cyan: #00E5FF;
  --cyan-dim: rgba(0,229,255,0.12);
  --warning: #F59E0B;
  --danger: #EF4444;

  /* Spacing scale (4px base) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* Radii */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* Typography */
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
  --shadow-glow: 0 0 24px rgba(99,102,241,0.15);

  /* Transitions */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --duration-fast: 150ms;
  --duration-normal: 200ms;
  --duration-slow: 300ms;
}

/* ═══════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--font-sans);
  background: var(--bg-root);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh; height: 100dvh;
  width: 100vw; width: 100dvw;
  letter-spacing: -0.011em;
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════
   CANVAS LAYER
   ═══════════════════════════════════════════════ */
#canvas-container {
  position: fixed; inset: 0; z-index: 1;
}
canvas { display: block; }

/* Hand skeleton overlay */
#hand-overlay {
  position: fixed; inset: 0; z-index: 8;
  pointer-events: none;
  display: none;
}

/* ═══════════════════════════════════════════════
   HUD OVERLAY
   ═══════════════════════════════════════════════ */
#hud {
  position: fixed; inset: 0; z-index: 10;
  pointer-events: none;
}
#hud > * { pointer-events: auto; }

/* ═══════════════════════════════════════════════
   TOP BAR — Glass surface
   ═══════════════════════════════════════════════ */
#topbar {
  position: absolute;
  top: var(--space-4);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  background: var(--bg-glass);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-full);
  padding: 6px 8px;
  box-shadow: var(--shadow-lg);
  transition: border-color var(--duration-normal) var(--ease-out);
}
#topbar:focus-within {
  border-color: var(--border-strong);
}

#topbar .brand {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: 0 var(--space-3);
  font-weight: 600;
  font-size: 14px;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  white-space: nowrap;
}
#topbar .brand-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: brand-pulse 2s ease-in-out infinite;
}
@keyframes brand-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* Search */
.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
#search-input {
  width: 260px;
  background: var(--bg-root);
  border: 1px solid transparent;
  color: var(--text-primary);
  padding: 9px 14px 9px 36px;
  border-radius: var(--radius-full);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 400;
  outline: none;
  transition: all var(--duration-normal) var(--ease-out);
  letter-spacing: -0.01em;
}
#search-input::placeholder { color: var(--text-muted); }
#search-input:focus {
  border-color: var(--border-default);
  width: 320px;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--text-muted);
  display: flex;
}

/* Stats pill */
#stats-pill {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  white-space: nowrap;
  padding: 0 var(--space-3);
  border-left: 1px solid var(--border-subtle);
  margin-left: var(--space-1);
  user-select: none;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  padding: 8px 14px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 12.5px;
  font-weight: 500;
  transition: all var(--duration-fast) var(--ease-out);
  white-space: nowrap;
  letter-spacing: -0.01em;
  user-select: none;
}
.btn:hover { color: var(--text-primary); background: var(--bg-elevated); border-color: var(--border-subtle); }
.btn:active { transform: scale(0.97); }
.btn.is-active {
  background: var(--accent-dim);
  border-color: rgba(34,197,94,0.25);
  color: var(--accent);
  font-weight: 600;
}
.btn .btn-icon { width: 15px; height: 15px; flex-shrink: 0; }

/* ═══════════════════════════════════════════════
   DETAIL PANEL — Right side drawer
   ═══════════════════════════════════════════════ */
#detail-panel {
  position: absolute;
  right: var(--space-4);
  top: 88px;
  bottom: var(--space-4);
  width: 360px;
  max-width: calc(100vw - 32px);
  background: var(--bg-glass);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  padding: 0;
  box-shadow: var(--shadow-lg);
  display: none;
  flex-direction: column;
  overflow: hidden;
  animation: panel-in var(--duration-slow) var(--ease-out);
}
@keyframes panel-in { from { opacity:0; transform:translateX(16px) scale(0.98); } to { opacity:1; transform:translateX(0) scale(1); } }
#detail-panel.visible { display: flex; }

.panel-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: var(--space-5) var(--space-5) var(--space-3);
  border-bottom: 1px solid var(--border-subtle);
}
.panel-header h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  line-height: 1.3;
  flex: 1;
  padding-right: var(--space-3);
}
#close-detail {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  flex-shrink: 0;
  transition: all var(--duration-fast) var(--ease-out);
}
#close-detail:hover { background: var(--bg-elevated); color: var(--text-primary); }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-4) var(--space-5);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }

.panel-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
}
.panel-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  letter-spacing: 0.01em;
}
.panel-badge.type-project { background: rgba(136,204,255,0.15); color: #B8D8FF; }
.panel-badge.type-note { background: var(--info-dim); color: var(--info); }
.panel-badge.connections { background: var(--cyan-dim); color: var(--cyan); }

.panel-stats {
  display: flex;
  gap: var(--space-4);
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-1);
}
.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
  letter-spacing: 0.01em;
}

.panel-summary {
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-secondary);
}

.panel-links { display: flex; flex-direction: column; gap: 2px; }
.panel-links-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: var(--space-2);
}
.link-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--info);
  transition: all var(--duration-fast) var(--ease-out);
  text-decoration: none;
  border: 1px solid transparent;
}
.link-row:hover { background: var(--info-dim); border-color: rgba(99,102,241,0.15); }
.link-row .link-icon { color: var(--text-muted); flex-shrink: 0; width: 14px; height: 14px; }

/* ═══════════════════════════════════════════════
   LEGEND — Bottom left
   ═══════════════════════════════════════════════ */
#legend {
  position: absolute;
  left: var(--space-4);
  bottom: var(--space-6);
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: var(--space-3) var(--space-4);
  font-size: 11px;
  color: var(--text-muted);
  box-shadow: var(--shadow-md);
  display: flex;
  flex-direction: column;
  gap: 5px;
  letter-spacing: 0.01em;
}
#legend .leg-row { display:flex; align-items:center; gap:var(--space-2); }
#legend .leg-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
#legend .leg-dot.project { background: #E0F0FF; box-shadow: 0 0 8px rgba(136,204,255,0.6); }
#legend .leg-dot.hub { background: var(--cyan); box-shadow: 0 0 8px rgba(0,229,255,0.5); }
#legend .leg-dot.note { background: var(--info); }
#legend .leg-dot.orphan { background: var(--danger); }
#legend .leg-divider { border-top:1px solid var(--border-subtle); margin:3px 0; }
#legend .leg-hint { font-size:10px; color:var(--text-disabled); }

/* ═══════════════════════════════════════════════
   GESTURE INDICATOR
   ═══════════════════════════════════════════════ */
#gesture-indicator {
  position: absolute;
  bottom: var(--space-6);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--accent);
  border-radius: var(--radius-full);
  padding: 8px 20px;
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
  display: none;
  box-shadow: var(--accent-glow);
  animation: soft-pulse 2s ease-in-out infinite;
  z-index: 30;
}
@keyframes soft-pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ═══════════════════════════════════════════════
   AR OVERLAYS
   ═══════════════════════════════════════════════ */
#ar-vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 5;
  display: none;
  box-shadow: inset 0 0 180px 80px rgba(0,0,0,0.6);
}
#ar-vignette.active { display: block; }

#ar-scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 6;
  display: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
}
#ar-scanlines.active { display: block; }

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 768px) {
  #topbar {
    flex-wrap: wrap;
    border-radius: var(--radius-lg);
    padding: var(--space-2);
    gap: 4px;
    left: var(--space-2); right: var(--space-2);
    transform: none;
  }
  #search-input { width: 140px; }
  #search-input:focus { width: 180px; }
  #detail-panel {
    width: calc(100vw - 16px);
    right: var(--space-2); left: var(--space-2);
    top: 72px; bottom: var(--space-2);
  }
  #legend { display: none; }
  #stats-pill { display: none; }
  .btn { padding: 7px 10px; font-size: 11px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div id="canvas-container"></div>
<canvas id="hand-overlay"></canvas>

<div id="hud">
  <!-- Top Bar -->
  <div id="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      Second Brain
    </div>
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input id="search-input" type="text" placeholder="Search knowledge graph..." autocomplete="off" spellcheck="false">
    </div>
    <span id="stats-pill">—</span>
    <button class="btn" id="btn-fit" title="Fit all nodes">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      Fit
    </button>
    <button class="btn" id="btn-ar" title="Webcam AR mode">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      AR
    </button>
    <button class="btn" id="btn-tags" title="Color by tag">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Tags
    </button>
  </div>

  <!-- Detail Panel -->
  <div id="detail-panel">
    <div class="panel-header">
      <h2 id="detail-title"></h2>
      <button id="close-detail">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-body" id="detail-content"></div>
  </div>

  <!-- Gesture Indicator -->
  <div id="gesture-indicator">Gesture: —</div>

  <!-- Legend -->
  <div id="legend">
    <div class="leg-row"><span class="leg-dot project"></span> Project</div>
    <div class="leg-row"><span class="leg-dot hub"></span> Hub</div>
    <div class="leg-row"><span class="leg-dot note"></span> Note / File</div>
    <div class="leg-row"><span class="leg-dot orphan"></span> Orphan</div>
    <div class="leg-divider"></div>
    <div class="leg-hint">Drag rotate · Scroll zoom · Click node</div>
  </div>

  <!-- AR Overlays -->
  <div id="ar-vignette"></div>
  <div id="ar-scanlines"></div>
</div>

<!-- Three.js Import Map -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ── State ────────────────────────────────────
let graphData = null;
let nodeMeshes = [];
let edgeLines = [];
let labelObjects = [];
let selectedNode = null;
let webcamARActive = false;
let handTrackingActive = false;
let tagColorMode = false;
let handLandmarker = null;

// Gesture state machine
let gestureState = {
  wasPinching: false,
  pinchStartSize: 0,
  pinchStartZ: 0,
  prevHandAngle: 0,
  prevWristX: 0,
  prevWristY: 0,
  frameSkip: 0,
  // Smoothing & hysteresis
  smoothLandmarks: null,    // EMA-smoothed landmarks
  currentGesture: 'open',   // 'open' | 'pinch' | 'fist'
  gestureFrames: 0,         // how long current gesture has been held
  lockThreshold: 5,         // frames before locking in a gesture
};

// ── Three.js Setup ────────────────────────────
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color('#08080D');
scene.fog = new THREE.FogExp2('#08080D', 0.00012);

const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(20, 12, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(container.clientWidth, container.clientHeight);
labelRenderer.domElement.style.cssText = 'position:absolute;top:0;pointer-events:none;';
container.appendChild(labelRenderer.domElement);

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(container.clientWidth, container.clientHeight), 0.45, 0.4, 0.15);
composer.addPass(bloomPass);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 200;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.25;
controls.target.set(0, 0, 0);

// ── Lighting ──────────────────────────────────
scene.add(new THREE.AmbientLight('#1a1a30', 1.5));
const pl1 = new THREE.PointLight('#6366F1', 60, 60); pl1.position.set(20, 15, 20); scene.add(pl1);
const pl2 = new THREE.PointLight('#22C55E', 40, 50); pl2.position.set(-15, -5, -15); scene.add(pl2);
const pl3 = new THREE.PointLight('#00E5FF', 30, 40); pl3.position.set(0, 10, -20); scene.add(pl3);

// ── Particle field ────────────────────────────
const starsGeo = new THREE.BufferGeometry();
const starPositions = new Float32Array(1000 * 3);
for (let i = 0; i < 1000; i++) {
  starPositions[i*3] = (Math.random() - 0.5) * 80;
  starPositions[i*3+1] = (Math.random() - 0.5) * 80;
  starPositions[i*3+2] = (Math.random() - 0.5) * 80;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({
  color: '#2A2A44', size: 0.05, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
}));
scene.add(stars);

// ── Grid ring ─────────────────────────────────
const ringGeo = new THREE.RingGeometry(14, 14.04, 120);
const ringMesh = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({
  color: '#1E1E2E', side: THREE.DoubleSide, transparent: true, opacity: 0.4, depthWrite: false,
}));
ringMesh.rotation.x = -Math.PI / 2;
ringMesh.position.y = -12;
scene.add(ringMesh);

// ── Node color/size helpers ───────────────────
function getNodeColor(node) {
  // Project nodes: futuristic ice-white/cyan core
  if (node.type === 'project') return new THREE.Color('#E0F0FF');
  if (tagColorMode && node.tags && node.tags.length > 0) {
    const h = (node.tags[0].split('').reduce((a,c)=>a+c.charCodeAt(0),0) * 137.5) % 360;
    return new THREE.Color(`hsl(${h}, 70%, 58%)`);
  }
  const d = node.degree || 0;
  if (d >= 5) return new THREE.Color('#00E5FF');
  if (d === 0) return new THREE.Color('#FF6B6B');
  return new THREE.Color('#818CF8');
}
function getNodeSize(node) {
  if (node.type === 'project') return Math.max(0.7, Math.min(1.6, 0.8 + (node.degree||0)*0.02));
  return Math.max(0.12, Math.min(0.55, 0.16 + (node.degree||0)*0.05));
}

// ── Build 3D graph ────────────────────────────
function clearGraph() {
  nodeMeshes.forEach(m => scene.remove(m));
  edgeLines.forEach(l => scene.remove(l));
  labelObjects.forEach(l => scene.remove(l));
  nodeMeshes = []; edgeLines = []; labelObjects = [];
}

function buildGraphVisuals() {
  if (!graphData) return;
  clearGraph();
  const { nodes, edges } = graphData;

  // Force-directed layout
  const positions = {};
  const velocities = {};
  nodes.forEach(n => {
    positions[n.id] = new THREE.Vector3((Math.random()-0.5)*20, (Math.random()-0.5)*15, (Math.random()-0.5)*20);
    velocities[n.id] = new THREE.Vector3();
  });

  for (let iter = 0; iter < 80; iter++) {
    const nids = Object.keys(positions);
    for (let i = 0; i < nids.length; i++) {
      for (let j = i+1; j < nids.length; j++) {
        const diff = new THREE.Vector3().subVectors(positions[nids[i]], positions[nids[j]]);
        const dist = Math.max(0.5, diff.length());
        const force = 300 / (dist * dist);
        diff.normalize().multiplyScalar(force * 0.005);
        velocities[nids[i]].add(diff);
        velocities[nids[j]].sub(diff);
      }
    }
    edges.forEach(e => {
      const a = positions[e.source], b = positions[e.target];
      if (!a || !b) return;
      const diff = new THREE.Vector3().subVectors(b, a);
      const dist = diff.length();
      diff.normalize().multiplyScalar(0.01 * (dist - 3) * 0.1);
      velocities[e.source].add(diff);
      velocities[e.target].sub(diff);
    });
    nids.forEach(id => { velocities[id].multiplyScalar(0.9); positions[id].add(velocities[id]); });
  }

  // Create meshes
  nodes.forEach(node => {
    const pos = positions[node.id];
    const size = getNodeSize(node);
    const color = getNodeColor(node);
    const isProject = node.type === 'project';

    // Glow
    const glowColor = isProject ? new THREE.Color('#4488CC') : color;
    const glowGeo = new THREE.SphereGeometry(size * (isProject ? 2.2 : 1.4), 32, 32);
    const glowMesh = new THREE.Mesh(glowGeo, new THREE.MeshBasicMaterial({
      color: glowColor, transparent: true, opacity: isProject ? 0.3 : 0.1, depthWrite: false,
    }));
    glowMesh.position.copy(pos);
    scene.add(glowMesh);
    nodeMeshes.push(glowMesh);

    // Main mesh — futuristic icosahedron for projects, sphere for notes
    if (isProject) {
      // Icosahedron core (sharp geometric, futuristic)
      const coreGeo = new THREE.IcosahedronGeometry(size * 0.7, 1);
      const coreMat = new THREE.MeshStandardMaterial({
        color: 0xE0F0FF, roughness: 0.2, metalness: 0.95,
        emissive: 0x4488CC, emissiveIntensity: 0.5,
      });
      const core = new THREE.Mesh(coreGeo, coreMat);
      core.position.copy(pos);
      core.userData = { nodeId: node.id, nodeData: node };
      scene.add(core);
      nodeMeshes.push(core);

      // Wireframe cage around it
      const cageGeo = new THREE.IcosahedronGeometry(size * 1.1, 0);
      const cageMat = new THREE.MeshBasicMaterial({
        color: 0x88CCFF, wireframe: true, transparent: true, opacity: 0.5, depthWrite: false,
      });
      const cage = new THREE.Mesh(cageGeo, cageMat);
      cage.position.copy(pos);
      cage.userData = { nodeId: node.id, isCage: true };
      scene.add(cage);
      nodeMeshes.push(cage);

      // Outer orbit ring
      const ringGeo = new THREE.TorusGeometry(size * 1.5, 0.025, 16, 64);
      const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({
        color: 0x88CCFF, transparent: true, opacity: 0.6, depthWrite: false,
      }));
      ring.position.copy(pos);
      ring.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
      ring.userData = { nodeId: node.id, isRing: true };
      scene.add(ring);
      nodeMeshes.push(ring);
    } else {
      // Standard sphere for notes
      const geo = new THREE.SphereGeometry(size, 32, 32);
      const mat = new THREE.MeshStandardMaterial({
        color, roughness: 0.3, metalness: 0.6,
        emissive: color, emissiveIntensity: 0.3,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      mesh.userData = { nodeId: node.id, nodeData: node };
      scene.add(mesh);
      nodeMeshes.push(mesh);

      // Orbit ring for hubs
      if (node.degree >= 4) {
        const rg = new THREE.TorusGeometry(size * 1.6, 0.035, 16, 48);
        const rm = new THREE.Mesh(rg, new THREE.MeshBasicMaterial({
          color: 0x00E5FF, transparent: true, opacity: 0.4, depthWrite: false,
        }));
        rm.position.copy(pos);
        rm.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
        rm.userData = { nodeId: node.id, isRing: true };
        scene.add(rm); nodeMeshes.push(rm);
      }
    }

    // Label
    const div = document.createElement('div');
    div.textContent = node.label;
    const ls = isProject ? (14 + Math.min(node.degree||0,30)*0.5) : (9 + (node.degree||0)*1.2);
    div.style.cssText = `font-family:'Inter',system-ui,sans-serif;font-size:${ls}px;color:${isProject?'#B8D8FF':'#E2E2EE'};text-shadow:0 0 ${isProject?'14px':'6px'} ${isProject?'#4488CC':'#'+color.getHexString()};pointer-events:none;white-space:nowrap;font-weight:${isProject?'700':(node.degree>=4?'600':'400')};${isProject?'letter-spacing:0.02em;':''}`;
    const label = new CSS2DObject(div);
    label.position.copy(pos.clone().add(new THREE.Vector3(0, size+0.8, 0)));
    label.userData = { nodeId: node.id };
    scene.add(label); labelObjects.push(label);
  });

  // Edges — brighter, visible connections
  edges.forEach(e => {
    const a = positions[e.source], b = positions[e.target];
    if (!a || !b) return;
    const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
    const dist = new THREE.Vector3().subVectors(b, a).length();
    mid.y += dist * 0.06;
    const curve = new THREE.QuadraticBezierCurve3(a.clone(), mid, b.clone());
    const points = curve.getPoints(40);

    // Main edge line — brighter, more visible
    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({
      color: '#4A4A6A', transparent: true, opacity: 0.5, depthWrite: false,
    }));
    scene.add(line);
    edgeLines.push(line);

    // Subtle glow tube for important connections (degree >= 3 on either end)
    const srcNode = nodes.find(n => n.id === e.source);
    const tgtNode = nodes.find(n => n.id === e.target);
    if ((srcNode?.degree >= 3 || srcNode?.type === 'project') &&
        (tgtNode?.degree >= 3 || tgtNode?.type === 'project')) {
      const glowCurve = new THREE.CatmullRomCurve3(points.filter((_, i) => i % 4 === 0));
      const tubeGeo = new THREE.TubeGeometry(glowCurve, 20, 0.03, 8, false);
      const tube = new THREE.Mesh(tubeGeo, new THREE.MeshBasicMaterial({
        color: '#667799', transparent: true, opacity: 0.25, depthWrite: false,
      }));
      scene.add(tube);
      edgeLines.push(tube);
    }
  });
}

  const connNodes = [];

    graphData.nodes.forEach(n => { nodeMap[n.id] = n; });

      if (nodeMap[nid]) connNodes.push(nodeMap[nid]);
    });

  document.getElementById('detail-content').innerHTML = `
    <div class="panel-meta">
      <span class="panel-badge ${isProject ? 'type-project' : 'type-note'}">${isProject ? 'Project' : (node.type || 'Note')}</span>
      <span class="panel-badge connections">${degree} links</span>

    ${node.path ? `<div class="panel-stats"><span>${node.path}</span></div>` : ''}
    ${node.project ? `<div class="panel-stats"><span>@${node.project}</span></div>` : ''}
    <div class="tag-list">${(node.tags||[]).slice(0,12).map(t=>`<span class="tag">${t}</span>`).join('')||'<span style="font-size:11px;color:var(--text-muted)">No tags</span>'}</div>
    ${node.summary||node.description ? `<div class="panel-summary">${(node.summary||node.description||'').substring(0,350)}</div>` : ''}
    ${connNodes.length ? `

          <div class="link-row" data-nid="${n.id}">

            ${n.label}

// ── Search ────────────────────────────────────
let searchTimeout;
document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => searchNodes(e.target.value), 150);
});

function searchNodes(query) {
  if (!graphData) return;
  const q = query.toLowerCase().trim();
  nodeMeshes.forEach(m => {
    if (m.material?.opacity !== undefined) m.material.opacity = m.userData.isRing ? (m.userData.nodeData?.type==='project'?0.45:0.3) : (m.material.emissiveIntensity!==undefined?1:0.1);
  });
  labelObjects.forEach(l => l.visible = true);
  if (!q) return;
  const matchIds = new Set();
  graphData.nodes.forEach(n => {
    if (n.label.toLowerCase().includes(q) || (n.tags||[]).some(t=>t.toLowerCase().includes(q))) matchIds.add(n.id);
  });
  nodeMeshes.forEach(m => {
    if (m.userData.nodeId && !matchIds.has(m.userData.nodeId) && m.material?.opacity !== undefined) m.material.opacity = 0.06;
  });
  labelObjects.forEach(l => {
    if (l.userData.nodeId && !matchIds.has(l.userData.nodeId)) l.visible = false;
  });
}

async function toggleWebcamAR() {

// ── Hand Tracking (works standalone or with AR) ──
async function initHandTracking() {
  if (handLandmarker) {
    handTrackingActive = true;
    document.getElementById('gesture-indicator').style.display = 'block';
    // Ensure we have a camera stream for hands
    if (!handsStream && !webcamARActive) {
      try {
        handsStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
        handsVideo.srcObject = handsStream;
        await handsVideo.play();
      } catch(e) { console.warn('Camera for hands failed:', e); }
    }
    return;
  }
  try {
    // Get camera for hand tracking (if not already in AR mode)
    if (!webcamARActive) {
      handsStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
      handsVideo.srcObject = handsStream;
      await handsVideo.play();
    }

    const { FilesetResolver, HandLandmarker } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/+esm');
    const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm');
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate: 'GPU' },
      runningMode: 'VIDEO', numHands: 2,
    });
    handTrackingActive = true;
    document.getElementById('gesture-indicator').style.display = 'block';
    console.log('Hand tracking ready — show your hand to the camera');
  } catch(err) {
    console.error('MediaPipe load error:', err);
    handTrackingActive = false;
    document.getElementById('gesture-indicator').style.display = 'none';
  }
}

function detectHands() {
  if (!handTrackingActive || !handLandmarker) return;

  gestureState.frameSkip = (gestureState.frameSkip || 0) + 1;
  if (gestureState.frameSkip % 3 !== 0) return;

  const video = handsVideo.srcObject ? handsVideo : (webcamARActive ? arVideo : null);
  if (!video || video.readyState < 2) return;

  try {
    const results = handLandmarker.detectForVideo(video, performance.now());
    if (results.landmarks?.length > 0) {
      const raw = results.landmarks[0];
      // Exponential moving average smoothing (α=0.35) kills jitter
      if (!gestureState.smoothLandmarks) {
        gestureState.smoothLandmarks = raw.map(l => ({x:l.x, y:l.y, z:l.z}));
      } else {
        const α = 0.35;
        raw.forEach((l, i) => {
          gestureState.smoothLandmarks[i].x += α * (l.x - gestureState.smoothLandmarks[i].x);
          gestureState.smoothLandmarks[i].y += α * (l.y - gestureState.smoothLandmarks[i].y);
          gestureState.smoothLandmarks[i].z += α * (l.z - gestureState.smoothLandmarks[i].z);
        });
      }
      processGestures([gestureState.smoothLandmarks]);
      document.getElementById('gesture-indicator').style.opacity = '1';
      handCanvas.style.display = 'block';
    } else {
      gestureState.smoothLandmarks = null;
      gestureState.currentGesture = 'open';
      gestureState.gestureFrames = 0;
      document.getElementById('gesture-indicator').style.opacity = '0.4';
      handCanvas.style.display = 'none';
      handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
    }
  } catch(e) { /* ignore */ }
}

// Hand skeleton connections (MediaPipe hand topology)
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],         // thumb
  [0,5],[5,6],[6,7],[7,8],         // index
  [0,9],[9,10],[10,11],[11,12],    // middle
  [0,13],[13,14],[14,15],[15,16],  // ring
  [0,17],[17,18],[18,19],[19,20],  // pinky
  [5,9],[9,13],[13,17],            // palm
];

const handCanvas = document.getElementById('hand-overlay');
const handCtx = handCanvas.getContext('2d');

function resizeHandCanvas() {
  handCanvas.width = window.innerWidth;
  handCanvas.height = window.innerHeight;
}
resizeHandCanvas();
window.addEventListener('resize', resizeHandCanvas);

function drawHandSkeleton(landmarks) {
  const w = handCanvas.width;
  const h = handCanvas.height;
  handCtx.clearRect(0, 0, w, h);

  const videoW = 640;
  const videoH = 480;
  const scale = Math.min(w / videoW, h / videoH);
  const offsetX = (w - videoW * scale) / 2;
  const offsetY = (h - videoH * scale) / 2;

  function toScreen(lm) {
    return [offsetX + (1 - lm.x) * videoW * scale, offsetY + lm.y * videoH * scale];
  }

  // Per-finger colors: extended = cyan, curled = magenta
  const fingerKeys = ['thumb','index','middle','ring','pinky'];
  const fingerTips = { thumb:4, index:8, middle:12, ring:16, pinky:20 };
  const fingerBones = {
    thumb: [[0,1],[1,2],[2,3],[3,4]],
    index: [[0,5],[5,6],[6,7],[7,8]],
    middle: [[0,9],[9,10],[10,11],[11,12]],
    ring: [[0,13],[13,14],[14,15],[15,16]],
    pinky: [[0,17],[17,18],[18,19],[19,20]],
  };
  const palmBones = [[5,9],[9,13],[13,17]];

  for (const hand of landmarks) {
    // Draw each finger with its state color
    for (const key of fingerKeys) {
      const extended = isFingerExtended([hand], key);
      const coreColor = extended ? '#00E5FF' : '#FF4488';
      const glowColor = extended ? 'rgba(0,229,255,0.3)' : 'rgba(255,68,136,0.3)';

      for (const [a, b] of fingerBones[key]) {
        const [ax, ay] = toScreen(hand[a]);
        const [bx, by] = toScreen(hand[b]);
        // Glow
        handCtx.beginPath(); handCtx.moveTo(ax, ay); handCtx.lineTo(bx, by);
        handCtx.strokeStyle = glowColor; handCtx.lineWidth = 6; handCtx.lineCap = 'round';
        handCtx.stroke();
        // Core
        handCtx.beginPath(); handCtx.moveTo(ax, ay); handCtx.lineTo(bx, by);
        handCtx.strokeStyle = coreColor; handCtx.lineWidth = 2.5;
        handCtx.stroke();
      }

      // Fingertip glow
      const [tx, ty] = toScreen(hand[fingerTips[key]]);
      handCtx.beginPath(); handCtx.arc(tx, ty, 5, 0, Math.PI*2);
      handCtx.fillStyle = extended ? '#FFFFFF' : '#FF88AA';
      handCtx.fill();
      handCtx.shadowColor = extended ? '#00E5FF' : '#FF4488';
      handCtx.shadowBlur = 14; handCtx.fill(); handCtx.shadowBlur = 0;
    }

    // Palm bones (always cyan)
    for (const [a, b] of palmBones) {
      const [ax, ay] = toScreen(hand[a]); const [bx, by] = toScreen(hand[b]);
      handCtx.beginPath(); handCtx.moveTo(ax, ay); handCtx.lineTo(bx, by);
      handCtx.strokeStyle = 'rgba(0,229,255,0.2)'; handCtx.lineWidth = 4;
      handCtx.stroke();
    }

    // Wrist dot
    const [wx, wy] = toScreen(hand[0]);
    handCtx.beginPath(); handCtx.arc(wx, wy, 4, 0, Math.PI*2);
    handCtx.fillStyle = '#00E5FF'; handCtx.fill();
  }
}

// ── Advanced hand analysis ────────────────────

// Landmark indices for finger joints (MCP, PIP, DIP, TIP)
const FINGERS = {
  thumb:  [1, 2, 3, 4],
  index:  [5, 6, 7, 8],
  middle: [9, 10, 11, 12],
  ring:   [13, 14, 15, 16],
  pinky:  [17, 18, 19, 20],
};

function vec3FromLM(lm) { return new THREE.Vector3(lm.x, lm.y, lm.z); }

// Angle between two 3D vectors
function angleBetween(a, b) {
  const dot = a.dot(b) / (a.length() * b.length());
  return Math.acos(Math.max(-1, Math.min(1, dot)));
}

// Compute the curl angle of a finger (MCP->PIP vs PIP->DIP angle)
// Returns radians — small angle = curled, large angle = extended
function fingerCurlAngle(landmarks, joints) {
  const h = landmarks[0];
  const mcp = vec3FromLM(h[joints[0]]);
  const pip = vec3FromLM(h[joints[1]]);
  const dip = vec3FromLM(h[joints[2]]);
  const tip = vec3FromLM(h[joints[3]]);
  const bone1 = new THREE.Vector3().subVectors(pip, mcp);
  const bone2 = new THREE.Vector3().subVectors(dip, pip);
  const bone3 = new THREE.Vector3().subVectors(tip, dip);
  // Average of both joint angles
  const a1 = angleBetween(bone1, bone2);
  const a2 = angleBetween(bone2, bone3);
  return (a1 + a2) / 2;
}

// Check if a finger is "extended" (straight, not curled)
function isFingerExtended(landmarks, fingerKey) {
  const angle = fingerCurlAngle(landmarks, FINGERS[fingerKey]);
  return angle > 2.2; // > ~126° means mostly straight
}

// Check if a finger is "curled" (bent)
function isFingerCurled(landmarks, fingerKey) {
  const angle = fingerCurlAngle(landmarks, FINGERS[fingerKey]);
  return angle < 1.6; // < ~92° means clearly bent
}

// Thumb-to-index pinch distance (using tip landmarks)
function pinchDistance(landmarks) {
  const h = landmarks[0];
  return landmarkDist(h[4], h[8]);
}

// Palm normal vector (wrist, index MCP, pinky MCP — right-hand rule)
function palmNormal(landmarks) {
  const h = landmarks[0];
  const wrist = vec3FromLM(h[0]);
  const idxMcp = vec3FromLM(h[5]);
  const pinkyMcp = vec3FromLM(h[17]);
  const v1 = new THREE.Vector3().subVectors(idxMcp, wrist);
  const v2 = new THREE.Vector3().subVectors(pinkyMcp, wrist);
  return new THREE.Vector3().crossVectors(v2, v1).normalize();
}

// Hand orientation vector (wrist → middle finger MCP)
function handDirection(landmarks) {
  const h = landmarks[0];
  return new THREE.Vector3().subVectors(vec3FromLM(h[9]), vec3FromLM(h[0])).normalize();
}

// ── Gesture detection with advanced landmarking ──

function classifyGesture(landmarks) {
  const pinchDist = pinchDistance(landmarks);
  const thumbExt = isFingerExtended(landmarks, 'thumb');
  const indexExt = isFingerExtended(landmarks, 'index');
  const middleExt = isFingerExtended(landmarks, 'middle');
  const ringExt = isFingerExtended(landmarks, 'ring');
  const pinkyExt = isFingerExtended(landmarks, 'pinky');
  const middleCurled = isFingerCurled(landmarks, 'middle');
  const ringCurled = isFingerCurled(landmarks, 'ring');
  const pinkyCurled = isFingerCurled(landmarks, 'pinky');

  const extendedCount = [thumbExt, indexExt, middleExt, ringExt, pinkyExt].filter(Boolean).length;
  const curledCount = [middleCurled, ringCurled, pinkyCurled].filter(Boolean).length;

  // PINCH: thumb+index tips close together, middle+ring+pinky extended (not a fist)
  if (pinchDist < 0.07 && middleExt && ringExt && pinkyExt) {
    return 'pinch';
  }

  // FIST: all 4 non-thumb fingers curled
  if (middleCurled && ringCurled && pinkyCurled && !indexExt) {
    return 'fist';
  }

  // POINT: only index extended, middle+ring+pinky curled
  if (indexExt && middleCurled && ringCurled && pinkyCurled) {
    return 'point';
  }

  // PEACE: index + middle extended, ring + pinky curled
  if (indexExt && middleExt && ringCurled && pinkyCurled) {
    return 'peace';
  }

  return 'open';
}

// ── Process gestures (jitter-proof) ──

function processGestures(landmarks) {
  const h = landmarks[0];
  const gs = gestureState;
  const size = landmarkDist(h[0], h[12]);

  const rawGesture = classifyGesture(landmarks);

  // ── Hysteresis: lock in after N frames, release faster ──
  if (rawGesture === gs.currentGesture) {
    gs.gestureFrames = Math.max(0, gs.gestureFrames - 1);
  } else if (rawGesture === 'open') {
    gs.gestureFrames++;
    if (gs.gestureFrames >= 3) { gs.currentGesture = 'open'; gs.gestureFrames = 0; }
  } else {
    gs.gestureFrames++;
    if (gs.gestureFrames >= gs.lockThreshold) {
      gs.currentGesture = rawGesture;
      if (rawGesture === 'pinch') gs.pinchStartSize = size;
      gs.gestureFrames = 0;
    }
  }

  // ── Apply gesture ──
  let label = 'OPEN — idle';
  controls.autoRotate = true;

  if (gs.currentGesture === 'pinch') {
    const sizeDelta = size - gs.pinchStartSize;
    const dist = camera.position.length();
    const newDist = Math.max(2, Math.min(200, dist * (1 - sizeDelta * 3.5)));
    camera.position.normalize().multiplyScalar(newDist);

    // Twist = rotate
    const angle = Math.atan2(h[9].y-h[0].y, h[9].x-h[0].x);
    const angleDelta = angle - gs.prevHandAngle;
    if (Math.abs(angleDelta) > 0.015 && Math.abs(angleDelta) < 0.5) {
      controls.autoRotate = false;
      controls.rotateLeft(angleDelta * 2);
    }
    gs.prevHandAngle = angle;
    label = `PINCH — ${newDist.toFixed(0)}u`;

  } else if (gs.currentGesture === 'fist') {
    controls.autoRotate = false;
    const dx = h[9].x - gs.prevWristX;
    const dy = h[9].y - gs.prevWristY;
    if (Math.abs(dx) > 0.002 || Math.abs(dy) > 0.002) {
      const panSpeed = camera.position.length() * 0.012;
      const right = new THREE.Vector3().crossVectors(
        camera.getWorldDirection(new THREE.Vector3()), camera.up
      ).normalize();
      controls.target.addScaledVector(right, -dx * panSpeed);
      controls.target.addScaledVector(camera.up, dy * panSpeed);
    }
    label = 'FIST — pan';

  } else if (gs.currentGesture === 'point') {
    // Point = click/select nearest node
    const dir = handDirection(landmarks);
    const origin = vec3FromLM(h[5]); // index MCP as ray origin
    // Project from hand space to screen space for raycasting
    label = 'POINT — select';

  } else if (gs.currentGesture === 'peace') {
    // Peace = zoom out fully (overview)
    const target = camera.position.clone().normalize().multiplyScalar(80);
    camera.position.lerp(target, 0.05);
    label = 'PEACE — overview';
  }

  gs.prevWristX = h[9].x;
  gs.prevWristY = h[9].y;

  document.getElementById('gesture-indicator').textContent = label;

  handCanvas.style.display = 'block';
  drawHandSkeleton(landmarks);
}

// Helper needed by processGestures
function landmarkDist(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + (a.z-b.z)**2);
}

// ── Buttons ───────────────────────────────────
document.getElementById('btn-ar').addEventListener('click', toggleWebcamAR);
document.getElementById('btn-fit').addEventListener('click', () => {
  camera.position.set(20, 12, 25); controls.target.set(0,0,0); controls.update();
});
document.getElementById('btn-tags').addEventListener('click', function() {
  tagColorMode = !tagColorMode; this.classList.toggle('is-active', tagColorMode); buildGraphVisuals();
});

// ── Keyboard ──────────────────────────────────
document.addEventListener('keydown', (e) => {
  switch(e.key.toLowerCase()) {
    case 'f': camera.position.set(20,12,25); controls.target.set(0,0,0); break;
    case 's': document.getElementById('search-input').focus(); break;
    case 't': tagColorMode=!tagColorMode; document.getElementById('btn-tags').classList.toggle('is-active',tagColorMode); buildGraphVisuals(); break;
    case 'escape': document.getElementById('detail-panel').classList.remove('visible'); selectedNode=null; break;
    case 'r': controls.autoRotate=!controls.autoRotate; break;
  }
});

// ── Resize ────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
  labelRenderer.setSize(container.clientWidth, container.clientHeight);
  composer.setSize(container.clientWidth, container.clientHeight);
});

// ── Main loop ─────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  stars.rotation.y += 0.00008;
  nodeMeshes.forEach(m => {
    if (m.userData.isRing && m.userData.nodeId === selectedNode?.id) {
      m.rotation.z += 0.015; m.rotation.x += 0.008;
      if (m.material?.opacity !== undefined) m.material.opacity = 0.45 + Math.sin(Date.now()*0.005)*0.25;
    }
  });

  // Hand detection integrated into main loop (throttled internally)
  if (handTrackingActive) detectHands();

  composer.render();
  labelRenderer.render(scene, camera);
}

// ── Init ──────────────────────────────────────
loadGraph();
animate();
</script>
