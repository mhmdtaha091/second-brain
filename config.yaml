# Second Brain Configuration
# All paths are relative to this config file's location

notes_dir: ./notes
graph_output: ./viz/graph-data.json
server:
  host: 127.0.0.1
  port: 8420

# Git integration
git:
  auto_commit: true
  commit_interval_minutes: 30
  remote: ""  # optional: push to private repo for backup

# Visualization
viz:
  theme: cyberpunk
  bloom_strength: 0.5
  auto_rotate: true
  node_scale: 1.0

# Security (everything local by default)
security:
  encrypt_notes: false  # set true for AES encryption at rest
  encryption_key_file: ""  # path to key file if encrypting
