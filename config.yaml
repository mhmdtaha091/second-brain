# Second Brain Configuration
# Indexes ALL your projects for a complete knowledge graph.

# Where your projects live
projects_root: ../  # D:/Projects (parent of second-brain/)

# Your personal notes (optional, separate from project files)
notes_dir: ./notes

# Generated graph for visualization
graph_output: ./viz/graph-data.json

# Server
server:
  host: 127.0.0.1
  port: 8420

# Git integration
git:
  auto_commit: true
  commit_interval_minutes: 30
  remote: ""

# Visualization
viz:
  theme: cyberpunk
  bloom_strength: 0.5
  auto_rotate: true

# Security (everything local by default)
security:
  encrypt_notes: false
